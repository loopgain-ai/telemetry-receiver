name = "loopgain-telemetry-receiver"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# D1 database binding — fill in `database_id` after running:
#   wrangler d1 create loopgain-telemetry
[[d1_databases]]
binding = "DB"
database_name = "loopgain-telemetry"
database_id = "1a641701-ac8b-4f7d-a24c-753f877aa36f"

# Custom domain. Added via dashboard 2026-05-12; declared here so future
# `wrangler deploy` runs re-apply the route if it's ever cleared.
[[routes]]
pattern = "telemetry.loopgain.ai/*"
zone_name = "loopgain.ai"

[observability]
enabled = true

# Scheduled trigger for the alert evaluator. Runs once per minute and
# evaluates every enabled alert_rule against the last `window_seconds` of
# loop_events. See `scheduled` export in src/index.ts.
[triggers]
crons = ["* * * * *"]

# First-party rate-limit bindings. `namespace_id` is an arbitrary integer
# unique within this Worker; the configured limit/period applies per key
# (the key is supplied at call time — see src/index.ts).
#
# AUTH_RL  — per-IP across all routes. Throttles unauth abuse / token spray.
# AGGREGATE_RL — per-customer on POST /v1/aggregate. Caps ingestion volume.
# READ_RL  — per-customer on GET /v1/* reads. Caps dashboard polling.
[[unsafe.bindings]]
name = "AUTH_RL"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

[[unsafe.bindings]]
name = "AGGREGATE_RL"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

[[unsafe.bindings]]
name = "READ_RL"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 120, period = 60 }

# PUBLIC_RL — per-IP on /v1/public/benchmark/* (the unauth bench-view
# routes). 120 rpm per IP gives the dashboard headroom for parallel
# panel fetches on /benchmark while still throttling abuse from a
# single source. Separate bucket from AUTH_RL so legitimate bench
# viewers don't compete with the authed-route ceiling.
[[unsafe.bindings]]
name = "PUBLIC_RL"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 120, period = 60 }

# FUNNEL_RL — per-IP on POST /v1/funnel (the unauth, anonymous funnel
# ingest from the OSS library). A single install emits a handful of events
# per session in batches every ~20s, so 120 rpm per IP is generous headroom
# while still throttling abuse from a single source. Separate bucket from
# AUTH_RL so anonymous funnel traffic never touches the authed-route ceiling.
[[unsafe.bindings]]
name = "FUNNEL_RL"
type = "ratelimit"
namespace_id = "1005"
simple = { limit = 120, period = 60 }

name = "loopgain-telemetry-receiver"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# D1 database binding — fill in `database_id` after running:
#   wrangler d1 create loopgain-telemetry
[[d1_databases]]
binding = "DB"
database_name = "loopgain-telemetry"
database_id = "1a641701-ac8b-4f7d-a24c-753f877aa36f"

# Custom domain. Added via dashboard 2026-05-12; declared here so future
# `wrangler deploy` runs re-apply the route if it's ever cleared.
[[routes]]
pattern = "telemetry.loopgain.ai/*"
zone_name = "loopgain.ai"

[observability]
enabled = true
